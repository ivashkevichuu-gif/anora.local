<!DOCTYPE html>
<html>
<head><title>Generate PWA Icons</title></head>
<body style="margin:0; background:#000; display:flex; flex-direction:column; align-items:center; padding:40px; gap:20px; font-family:sans-serif;">
  <p style="color:#fff;">Click buttons to download icons. Put them in <code style="color:#0f0;">frontend/public/</code></p>
  <div style="display:flex; gap:30px; flex-wrap:wrap; justify-content:center;">
    <div style="text-align:center;">
      <canvas id="c180" width="180" height="180" style="border:1px solid #333;"></canvas>
      <br><button onclick="dl('c180','apple-touch-icon.png')" style="margin-top:8px; padding:8px 16px; cursor:pointer; background:#00E5FF; border:none; border-radius:6px; font-weight:700;">apple-touch-icon.png (180)</button>
    </div>
    <div style="text-align:center;">
      <canvas id="c192" width="192" height="192" style="border:1px solid #333;"></canvas>
      <br><button onclick="dl('c192','icon-192.png')" style="margin-top:8px; padding:8px 16px; cursor:pointer; background:#00E5FF; border:none; border-radius:6px; font-weight:700;">icon-192.png</button>
    </div>
    <div style="text-align:center;">
      <canvas id="c512" width="512" height="512" style="border:1px solid #333;"></canvas>
      <br><button onclick="dl('c512','icon-512.png')" style="margin-top:8px; padding:8px 16px; cursor:pointer; background:#00E5FF; border:none; border-radius:6px; font-weight:700;">icon-512.png</button>
    </div>
  </div>
  <p style="color:#888; font-size:13px; margin-top:20px;">
    apple-touch-icon.png → <code>frontend/public/</code><br>
    icon-192.png, icon-512.png → <code>frontend/public/icons/</code>
  </p>
  <script>
    function draw(id, size) {
      const c = document.getElementById(id);
      const ctx = c.getContext('2d');
      const r = size * 0.22;

      // Rounded rect background
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, r);
      const bg = ctx.createLinearGradient(0, 0, size, size);
      bg.addColorStop(0, '#7c3aed');
      bg.addColorStop(1, '#a855f7');
      ctx.fillStyle = bg;
      ctx.fill();

      // Subtle inner glow
      const glow = ctx.createRadialGradient(size*0.3, size*0.3, 0, size/2, size/2, size*0.7);
      glow.addColorStop(0, 'rgba(255,255,255,0.08)');
      glow.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = glow;
      ctx.beginPath();
      ctx.roundRect(0, 0, size, size, r);
      ctx.fill();

      // Letter A
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = `900 ${size * 0.5}px Inter, Arial, sans-serif`;
      ctx.fillStyle = '#ffffff';
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = size * 0.04;
      ctx.shadowOffsetY = size * 0.02;
      ctx.fillText('A', size / 2, size / 2 + size * 0.02);
      ctx.shadowBlur = 0;
      ctx.shadowOffsetY = 0;
    }

    draw('c180', 180);
    draw('c192', 192);
    draw('c512', 512);

    function dl(id, name) {
      const a = document.createElement('a');
      a.download = name;
      a.href = document.getElementById(id).toDataURL('image/png');
      a.click();
    }
  </script>
</body>
</html>
