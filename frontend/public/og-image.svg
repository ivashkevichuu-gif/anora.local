<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0B0F1A"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0B0F1A"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" style="stop-color:#7A5CFF;stop-opacity:0.15"/>
      <stop offset="100%" style="stop-color:#7A5CFF;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:0.12"/>
      <stop offset="100%" style="stop-color:#00E5FF;stop-opacity:0"/>
    </radialGradient>
    <filter id="neon-cyan">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#00E5FF" flood-opacity="0.6"/>
    </filter>
    <filter id="neon-gold">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#FFC857" flood-opacity="0.5"/>
    </filter>
    <filter id="neon-purple">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#7A5CFF" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Particles -->
  <circle cx="150" cy="120" r="3" fill="#00E5FF" opacity="0.4"/>
  <circle cx="1050" cy="80" r="2" fill="#7A5CFF" opacity="0.5"/>
  <circle cx="200" cy="500" r="2.5" fill="#FFC857" opacity="0.3"/>
  <circle cx="980" cy="520" r="3" fill="#00E5FF" opacity="0.3"/>
  <circle cx="400" cy="60" r="2" fill="#FFC857" opacity="0.4"/>
  <circle cx="800" cy="570" r="2" fill="#7A5CFF" opacity="0.4"/>
  <circle cx="100" cy="300" r="1.5" fill="#00E5FF" opacity="0.5"/>
  <circle cx="1100" cy="280" r="2" fill="#FFC857" opacity="0.3"/>

  <!-- ANORA logo — vertically centered -->
  <text x="600" y="220" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="96" font-weight="900" letter-spacing="16" fill="#00E5FF" filter="url(#neon-cyan)">ANORA</text>

  <!-- Tagline -->
  <text x="600" y="275" text-anchor="middle" font-family="Inter, Segoe UI, sans-serif" font-size="24" font-weight="400" letter-spacing="6" fill="#6B7280">PROVABLY FAIR CRYPTO LOTTERY</text>

  <!-- Divider -->
  <line x1="400" y1="310" x2="800" y2="310" stroke="#00E5FF" stroke-width="1" opacity="0.3"/>

  <!-- Badges -->
  <rect x="195" y="340" width="180" height="40" rx="20" fill="#00E5FF" fill-opacity="0.1" stroke="#00E5FF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="285" y="366" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#00E5FF">🔒 Provably Fair</text>

  <rect x="415" y="340" width="160" height="40" rx="20" fill="#7A5CFF" fill-opacity="0.1" stroke="#7A5CFF" stroke-opacity="0.3" stroke-width="1"/>
  <text x="495" y="366" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#7A5CFF">₿ Crypto</text>

  <rect x="615" y="340" width="170" height="40" rx="20" fill="#FFC857" fill-opacity="0.1" stroke="#FFC857" stroke-opacity="0.3" stroke-width="1"/>
  <text x="700" y="366" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#FFC857">⚡ Real-Time</text>

  <rect x="825" y="340" width="180" height="40" rx="20" fill="#00ff88" fill-opacity="0.1" stroke="#00ff88" stroke-opacity="0.3" stroke-width="1"/>
  <text x="915" y="366" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#00ff88">💰 Instant Pay</text>

  <!-- Room labels -->
  <text x="420" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#FFC857" filter="url(#neon-gold)">$1</text>
  <text x="540" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#6B7280">•</text>
  <text x="600" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#7A5CFF" filter="url(#neon-purple)">$10</text>
  <text x="660" y="442" text-anchor="middle" font-family="Inter, sans-serif" font-size="16" fill="#6B7280">•</text>
  <text x="780" y="450" text-anchor="middle" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#00E5FF" filter="url(#neon-cyan)">$100</text>

  <!-- URL -->
  <text x="600" y="530" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="400" letter-spacing="3" fill="#4B5563">anora.bet</text>

  <!-- Border -->
  <rect x="2" y="2" width="1196" height="626" rx="8" fill="none" stroke="#00E5FF" stroke-opacity="0.1" stroke-width="1"/>
</svg>
