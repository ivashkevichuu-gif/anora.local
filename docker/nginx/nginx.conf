# ══════════════════════════════════════════════════════════════════════════════
# ANORA Platform — nginx API Gateway Configuration
#
# Routing:
#   /api/*  → php-fpm:9000 (FastCGI)
#   /ws/*   → websocket:8080 (WebSocket proxy)
#   /*      → static files (React SPA)
#
# Features:
#   - Rate limiting (100 req/min per IP for unauthenticated)
#   - X-Request-ID generation
#   - Centralized CORS handling
#   - WebSocket upgrade support
#   - JSON access logging
#   - Upstream timeout: 10s → 504 JSON error
# ══════════════════════════════════════════════════════════════════════════════

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile    on;
    tcp_nopush  on;
    keepalive_timeout 65;

    # ── Rate Limiting ────────────────────────────────────────────────────
    # 100 req/min per IP for unauthenticated requests
    # Zone: 10MB shared memory (~160k unique IPs)
    limit_req_zone $binary_remote_addr zone=global_rate:10m rate=100r/m;
    limit_req_status 429;

    # ── JSON Access Log Format ───────────────────────────────────────────
    log_format json_access escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$request_uri",'
            '"status":$status,'
            '"response_time":$request_time,'
            '"client_ip":"$remote_addr",'
            '"request_id":"$request_id"'
        '}';

    access_log /var/log/nginx/access.log json_access;

    # ── Upstreams ────────────────────────────────────────────────────────
    upstream php-fpm {
        server php-fpm:9000;
    }

    upstream websocket {
        server websocket:8080;
    }

    # ── CORS Map ─────────────────────────────────────────────────────────
    map $http_origin $cors_origin {
        default "";
        "http://anora.bet"       $http_origin;
        "https://anora.bet"      $http_origin;
        "http://anora.local"     $http_origin;
        "http://localhost:5173"  $http_origin;
    }

    server {
        listen 80;
        server_name _;

        root /var/www/html;
        index index.html;

        # ── X-Request-ID ────────────────────────────────────────────────
        # Generate unique request ID for tracing
        add_header X-Request-ID $request_id always;

        # ── Custom 504 error page (JSON) ────────────────────────────────
        error_page 504 /504.json;
        location = /504.json {
            internal;
            default_type application/json;
            return 504 '{"error": "Service unavailable"}';
        }

        # ── Custom 429 error page (JSON) ────────────────────────────────
        error_page 429 /429.json;
        location = /429.json {
            internal;
            default_type application/json;
            return 429 '{"error": "Too many requests"}';
        }

        # ── CORS Preflight (OPTIONS) ────────────────────────────────────
        # Handle OPTIONS globally before routing
        if ($request_method = 'OPTIONS') {
            set $cors_preflight 1;
        }

        # ── WebSocket Proxy: /ws/* → websocket:8080 ────────────────────
        location /ws/ {
            proxy_pass http://websocket;
            proxy_http_version 1.1;

            # WebSocket upgrade headers
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Request-ID $request_id;

            # Timeouts for long-lived WebSocket connections
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # ── API Routes: /api/* → php-fpm:9000 (FastCGI) ────────────────
        location /api/ {
            # Rate limiting: 100 req/min, burst 20 with nodelay
            limit_req zone=global_rate burst=20 nodelay;

            # CORS headers
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header X-Request-ID $request_id always;

            # Handle CORS preflight
            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID";
                add_header Access-Control-Allow-Credentials "true";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # Rewrite /api/auth/login → /backend/api/auth/login.php
            # Handle both /api/auth/login and /api/auth/login.php
            rewrite ^/api/(.*?)(?:\.php)?$ /backend/api/$1.php break;

            # FastCGI to PHP-FPM
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_X_REQUEST_ID $request_id;

            # Upstream timeout: 10s
            fastcgi_connect_timeout 10s;
            fastcgi_send_timeout 10s;
            fastcgi_read_timeout 10s;
        }

        # ── Legacy API Routes: /backend/api/* → php-fpm (backward compat) ──
        # Frontend uses BASE='/backend/api' with .php extensions
        location /backend/api/ {
            limit_req zone=global_rate burst=20 nodelay;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID" always;
            add_header Access-Control-Allow-Credentials "true" always;
            add_header X-Request-ID $request_id always;

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin $cors_origin;
                add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS";
                add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Request-ID";
                add_header Access-Control-Allow-Credentials "true";
                add_header Access-Control-Max-Age 86400;
                add_header Content-Length 0;
                add_header Content-Type text/plain;
                return 204;
            }

            # /backend/api/auth/register.php → FastCGI as-is
            fastcgi_pass php-fpm;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param HTTP_X_REQUEST_ID $request_id;

            fastcgi_connect_timeout 10s;
            fastcgi_send_timeout 10s;
            fastcgi_read_timeout 10s;
        }

        # ── Media Files: /media/* → rendered videos ────────────────────
        location /media/ {
            alias /app/media/;
            expires 7d;
            add_header Cache-Control "public, immutable";
            add_header Access-Control-Allow-Origin "*";
            add_header Content-Disposition "attachment";
            types {
                video/mp4 mp4;
            }
            default_type video/mp4;
        }

        # ── Static Files: /* → React SPA ────────────────────────────────
        location / {
            try_files $uri $uri/ /index.html;

            # Cache static assets
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                expires 1y;
                add_header Cache-Control "public, immutable";
                access_log off;
            }
        }
    }
}
